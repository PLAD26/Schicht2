<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicast · Multicast · Broadcast</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06080f;
    --panel: #0b0f1c;
    --border: #1a2235;
    --grid: #0d1525;
    --unicast: #00e5ff;
    --multicast: #a259ff;
    --broadcast: #ff6b2b;
    --text: #c8d8f0;
    --muted: #3a5070;
    --glow-u: 0 0 12px #00e5ff88;
    --glow-m: 0 0 12px #a259ff88;
    --glow-b: 0 0 12px #ff6b2b88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding-bottom: 40px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 20px 10px;
  }

  header h1 {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--unicast), var(--multicast), var(--broadcast));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  #mode-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 28px;
    border-radius: 4px;
    margin: 14px auto 0;
    display: inline-block;
    transition: color 0.4s, box-shadow 0.4s, border-color 0.4s;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
  }

  #canvas-wrap {
    position: relative;
    z-index: 1;
    width: min(700px, 96vw);
    margin: 20px auto 0;
  }

  #net-canvas {
    width: 100%;
    border-radius: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    display: block;
  }

  #info-box {
    position: relative;
    z-index: 1;
    width: min(700px, 96vw);
    margin: 14px auto 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 22px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    transition: border-color 0.4s;
  }

  .section-tag {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  #info-text { color: var(--text); }

  #controls {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 14px;
    margin: 18px auto 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 30px;
    border-radius: 8px;
    border: 2px solid;
    cursor: pointer;
    background: transparent;
    transition: background 0.25s, box-shadow 0.25s, transform 0.12s;
  }
  .btn:active { transform: scale(0.96); }

  .btn-u { color: var(--unicast); border-color: var(--unicast); }
  .btn-u:hover, .btn-u.active { background: #00e5ff14; box-shadow: var(--glow-u); }

  .btn-m { color: var(--multicast); border-color: var(--multicast); }
  .btn-m:hover, .btn-m.active { background: #a259ff14; box-shadow: var(--glow-m); }

  .btn-b { color: var(--broadcast); border-color: var(--broadcast); }
  .btn-b:hover, .btn-b.active { background: #ff6b2b14; box-shadow: var(--glow-b); }
</style>
</head>
<body>

<header>
  <h1>Unicast · Multicast · Broadcast</h1>
  <p>// Visualisierung von Netzwerk-Übertragungsmodi //</p>
  <div id="mode-label">— Modus auswählen —</div>
</header>

<div id="canvas-wrap">
  <canvas id="net-canvas" width="700" height="400"></canvas>
</div>

<div id="info-box">
  <div class="section-tag">// Modusbeschreibung</div>
  <div id="info-text">Wähle einen Übertragungsmodus, um die Simulation zu starten.</div>
</div>

<div id="controls">
  <button class="btn btn-u" id="btn-unicast"   onclick="setMode('unicast')">⬡ Unicast</button>
  <button class="btn btn-m" id="btn-multicast" onclick="setMode('multicast')">⬡ Multicast</button>
  <button class="btn btn-b" id="btn-broadcast" onclick="setMode('broadcast')">⬡ Broadcast</button>
</div>

<script>
const canvas = document.getElementById('net-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const SENDER_NODE = { x: 110, y: H/2, label: 'SENDER', id: 'sender' };
const RX_NODES = [
  { x: 560, y: 80,  label: 'RX-1', id: 'rx1' },
  { x: 590, y: 185, label: 'RX-2', id: 'rx2' },
  { x: 590, y: 295, label: 'RX-3', id: 'rx3' },
  { x: 560, y: 340, label: 'RX-4', id: 'rx4' },
];
const MULTICAST_TARGETS = [0, 1];

const COLORS = {
  unicast:   '#00e5ff',
  multicast: '#a259ff',
  broadcast: '#ff6b2b',
  idle:      '#1a2a3a',
};

const INFO_TEXT = {
  unicast:   `<strong style="color:#00e5ff">UNICAST</strong> — Punkt-zu-Punkt-Kommunikation.<br>Der Sender übermittelt Daten an <em>genau einen</em> bestimmten Empfänger. Das Paket trägt eine eindeutige Ziel-Adresse und wird nur von diesem Gerät verarbeitet.`,
  multicast: `<strong style="color:#a259ff">MULTICAST</strong> — Punkt-zu-Gruppe-Kommunikation.<br>Der Sender schickt <em>eine einzige Kopie</em> des Pakets. Die Netzinfrastruktur leitet es nur an Empfänger weiter, die der Multicast-Gruppe beigetreten sind (hier: RX-1 und RX-2).`,
  broadcast: `<strong style="color:#ff6b2b">BROADCAST</strong> — Punkt-zu-Alle-Kommunikation.<br>Der Sender adressiert das Paket an <em>alle Geräte</em> im Subnetz. Jeder Netzwerkadapter verarbeitet den Rahmen – unabhängig davon, ob der Inhalt relevant ist.`,
};

let currentMode = null;
let packets = [];
let animId = null;
let lastTs = 0;
let unicastTarget = 0;
let rxFade = [0,0,0,0];

function drawNode(node, color, pulse) {
  const r = node.id === 'sender' ? 34 : 26;
  if (pulse) {
    ctx.save();
    ctx.globalAlpha = 0.15 + 0.1 * Math.sin(Date.now()/180);
    ctx.beginPath(); ctx.arc(node.x, node.y, r+15, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill(); ctx.restore();
  }
  ctx.shadowColor = color; ctx.shadowBlur = pulse ? 20 : 6;
  ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, Math.PI*2);
  ctx.fillStyle = node.id==='sender' ? '#0d2018' : '#0b1620';
  ctx.fill(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.font = `bold ${node.id==='sender'?18:14}px 'Share Tech Mono', monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(node.id==='sender'?'📡':'💻', node.x, node.y-2);
  ctx.font = `600 10px 'Exo 2', sans-serif`;
  ctx.fillStyle = color;
  ctx.fillText(node.label, node.x, node.y+r+13);
}

function drawLine(a, b, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
}

function drawPacket(px, py, color) {
  ctx.save(); ctx.shadowColor = color; ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2);
  ctx.fillStyle = color+'cc'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();
}

class Packet {
  constructor(target, color, delay) {
    this.to = { ...target }; this.color = color;
    this.t = -delay; this.done = false; this._credited = false;
  }
  update(dt) {
    if (this.done) return;
    this.t += dt;
    if (this.t >= 1) { this.t = 1; this.done = true; }
  }
  draw() {
    if (this.t <= 0) return;
    const e = (t => t<0.5?2*t*t:-1+(4-2*t)*t)(Math.min(this.t,1));
    drawPacket(
      SENDER_NODE.x + (this.to.x - SENDER_NODE.x) * e,
      SENDER_NODE.y + (this.to.y - SENDER_NODE.y) * e,
      this.color
    );
  }
}

function lerpHex(h1, h2, t) {
  const p = h => [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const [r1,g1,b1]=p(h1),[r2,g2,b2]=p(h2);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

function render(ts) {
  const dt = Math.min((ts-lastTs)/900, 0.05); lastTs = ts;
  ctx.clearRect(0,0,W,H);

  const g = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.7);
  g.addColorStop(0,'#0c1220'); g.addColorStop(1,'#06080f');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  const ac = currentMode ? COLORS[currentMode] : COLORS.idle;
  RX_NODES.forEach(rx => drawLine(SENDER_NODE, rx, ac, 0.13));

  packets.forEach(p => {
    p.update(dt); p.draw();
    if (p.done && !p._credited) {
      p._credited = true;
      const idx = RX_NODES.findIndex(r => r.id===p.to.id);
      if (idx>=0) rxFade[idx] = 1.0;
    }
  });

  for (let i=0;i<4;i++) if (rxFade[i]>0) rxFade[i]=Math.max(0,rxFade[i]-dt*0.55);

  const senderPulse = currentMode && packets.some(p=>!p.done&&p.t>0);
  drawNode(SENDER_NODE, currentMode?ac:'#2a5070', senderPulse);

  RX_NODES.forEach((rx,i) => {
    let col = COLORS.idle;
    if (currentMode) {
      const isTarget =
        (currentMode==='unicast'   && i===unicastTarget) ||
        (currentMode==='multicast' && MULTICAST_TARGETS.includes(i)) ||
        (currentMode==='broadcast');
      col = isTarget ? lerpHex('#162030', ac, rxFade[i]) : '#132030';
    }
    drawNode(rx, col, rxFade[i]>0.25);
  });

  animId = requestAnimationFrame(render);
}

function setMode(m) {
  if (m==='unicast') {
    unicastTarget = currentMode==='unicast' ? (unicastTarget+1)%4 : 0;
  }

  currentMode = m;
  packets = [];
  rxFade = [0,0,0,0];

  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${m}`).classList.add('active');

  const c = COLORS[m];

  const ml = document.getElementById('mode-label');
  ml.textContent = {unicast:'— UNICAST —',multicast:'— MULTICAST —',broadcast:'— BROADCAST —'}[m];
  ml.style.color = c; ml.style.borderColor = c+'55'; ml.style.boxShadow = `0 0 10px ${c}33`;

  document.getElementById('info-text').innerHTML = INFO_TEXT[m];
  document.getElementById('info-box').style.borderColor = c+'55';

  if (m==='unicast') {
    packets.push(new Packet(RX_NODES[unicastTarget], c, 0));
  } else if (m==='multicast') {
    MULTICAST_TARGETS.forEach((idx,i) => packets.push(new Packet(RX_NODES[idx], c, i*0.08)));
  } else {
    RX_NODES.forEach((rx,i) => packets.push(new Packet(rx, c, i*0.06)));
  }

  if (!animId) { lastTs = performance.now(); animId = requestAnimationFrame(render); }
}

lastTs = performance.now();
animId = requestAnimationFrame(render);
</script>
</body>
</html>
